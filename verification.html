<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - PharmaMastermind</title>
    <link rel="shortcut icon" href="/pictures/icon.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("/pictures/SignUp.png") no-repeat center center / cover;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .verification-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #138BA8, #3498DB);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 2rem;
        }

        h1 {
            font-size: 24px;
            color: #138BA8;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.5;
        }

        .verification-form {
            margin-bottom: 20px;
        }

        .code-inputs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .code-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
        }

        .code-input:focus {
            border-color: #138BA8;
            box-shadow: 0 0 10px rgba(19, 139, 168, 0.3);
        }

        .code-input.filled {
            border-color: #138BA8;
            background-color: #f0f8ff;
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: linear-gradient(135deg, #138BA8, #3498DB);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(19, 139, 168, 0.3);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .resend-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .resend-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .resend-btn {
            background: none;
            border: none;
            color: #138BA8;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }

        .resend-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
            text-decoration: none;
        }

        .timer {
            color: #f39c12;
            font-weight: bold;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: #ffeaea;
            border-radius: 5px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: #eafaf1;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="verification-icon">
            📧
        </div>
        <h1>Verify Your Email</h1>
        <p class="subtitle">
            We've sent a 6-digit verification code to your email address. 
            Please enter the code below to verify your account.
        </p>

        <form class="verification-form" id="verificationForm">
            <div class="code-inputs">
                <input type="text" class="code-input" maxlength="1" id="code1">
                <input type="text" class="code-input" maxlength="1" id="code2">
                <input type="text" class="code-input" maxlength="1" id="code3">
                <input type="text" class="code-input" maxlength="1" id="code4">
                <input type="text" class="code-input" maxlength="1" id="code5">
                <input type="text" class="code-input" maxlength="1" id="code6">
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <button type="submit" class="btn" id="verifyBtn">Verify Email</button>
        </form>

        <div class="resend-section">
            <p class="resend-text">Didn't receive the code?</p>
            <button class="resend-btn" id="resendBtn" onclick="resendCode()">
                Resend Code <span class="timer" id="timer"></span>
            </button>
        </div>

        <p style="margin-top: 20px; font-size: 12px; color: #666;">
            <a href="/signin" style="color: #138BA8; text-decoration: none;">← Back to Sign In</a>
        </p>
    </div>

    <script>
        let resendTimer = 0;
        let timerInterval;
        const userEmail = sessionStorage.getItem('verificationEmail');
        const userName = sessionStorage.getItem('verificationName');

        // Auto-focus and input handling
        const codeInputs = document.querySelectorAll('.code-input');
        
        codeInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value;
                
                // Only allow numbers
                if (!/^\d$/.test(value)) {
                    e.target.value = '';
                    return;
                }
                
                // Add filled class
                e.target.classList.add('filled');
                
                // Move to next input
                if (value && index < codeInputs.length - 1) {
                    codeInputs[index + 1].focus();
                }
                
                // Enable verify button if all fields filled
                checkAllFieldsFilled();
            });
            
            input.addEventListener('keydown', (e) => {
                // Handle backspace
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    codeInputs[index - 1].focus();
                    codeInputs[index - 1].classList.remove('filled');
                }
            });
            
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text');
                const digits = pastedData.replace(/\D/g, '').slice(0, 6);
                
                digits.split('').forEach((digit, i) => {
                    if (codeInputs[i]) {
                        codeInputs[i].value = digit;
                        codeInputs[i].classList.add('filled');
                    }
                });
                
                checkAllFieldsFilled();
            });
        });

        // Focus first input on load
        codeInputs[0].focus();

        function checkAllFieldsFilled() {
            const allFilled = Array.from(codeInputs).every(input => input.value);
            document.getElementById('verifyBtn').disabled = !allFilled;
        }

        // Form submission
        document.getElementById('verificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const code = Array.from(codeInputs).map(input => input.value).join('');
            const email = sessionStorage.getItem('verificationEmail');
            
            if (code.length !== 6) {
                showError('Please enter the complete 6-digit code');
                return;
            }
            
            try {
                const response = await fetch('/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('Email verified successfully! Redirecting...');
                    sessionStorage.removeItem('verificationEmail');
                    sessionStorage.removeItem('verificationName');
                    setTimeout(() => {
                        window.location.href = '/signin';
                    }, 2000);
                } else {
                    showError(result.message || 'Invalid verification code');
                    clearInputs();
                }
            } catch (error) {
                showError('Verification failed. Please try again.');
                clearInputs();
            }
        });

        function clearInputs() {
            codeInputs.forEach(input => {
                input.value = '';
                input.classList.remove('filled');
            });
            codeInputs[0].focus();
            checkAllFieldsFilled();
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        async function resendCode() {
            const email = sessionStorage.getItem('verificationEmail');
            const name = sessionStorage.getItem('verificationName');
            
            if (!email) {
                showError('Session expired. Please sign up again.');
                return;
            }
            
            try {
                const response = await fetch('/resend-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('Verification code sent successfully!');
                    startResendTimer();
                    clearInputs();
                } else {
                    showError(result.message || 'Failed to resend code');
                }
            } catch (error) {
                showError('Failed to resend code. Please try again.');
            }
        }

        function startResendTimer() {
            resendTimer = 60;
            const resendBtn = document.getElementById('resendBtn');
            const timerSpan = document.getElementById('timer');
            
            resendBtn.disabled = true;
            
            timerInterval = setInterval(() => {
                timerSpan.textContent = `(${resendTimer}s)`;
                resendTimer--;
                
                if (resendTimer < 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    timerSpan.textContent = '';
                }
            }, 1000);
        }

        // Start timer on page load
        if (userEmail) {
            startResendTimer();
        } else {
            // Redirect to signup if no email in session
            window.location.href = '/signup';
        }
    </script>
</body>

</html>
